# ═══════════════════════════════════════════════════════════
#  StockPulse — application.properties
#  Location: src/main/resources/application.properties
# ═══════════════════════════════════════════════════════════

# ── Server ───────────────────────────────────────────────────
server.port=8080

# ── MySQL Database ───────────────────────────────────────────
# ⚠ CHANGE the password to your MySQL root password
spring.datasource.url=jdbc:mysql://localhost:3306/stockpulse?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── JWT ──────────────────────────────────────────────────────
jwt.secret=StockPulse2024VerySecretKeyForJWTTokenSigningMustBe256BitsLongXXXXXX
jwt.expiration.ms=86400000

# ── Logging ──────────────────────────────────────────────────
logging.level.com.stockpulse=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO

# ── Jackson ──────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info